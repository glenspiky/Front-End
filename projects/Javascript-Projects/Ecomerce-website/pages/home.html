<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/css/home.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/variables.css" />
  </head>
  <body>
    <div class="navbar-container">
      <div class="navbar">
        <img src="/assets/icons/nexora-pri.png" alt="logo" />

        <div class="search-bar">
          <i class="ri-search-line"></i>
          <input
            type="text"
            placeholder="Search products, brands and categories"
            id="search"
          />
          <button type="submit">Search</button>
        </div>

        <div class="nav-actions">
          <div class="location">
            <i class="ri-map-pin-line"></i>
            <p>location</p>
          </div>
          <div class="account-wrapper">
            <div class="account">
              <i class="ri-user-3-line"></i>
              <span>
                <p>Account</p>
                <i class="ri-arrow-drop-down-line"></i>
              </span>
            </div>
            <div class="acc-container"></div>
          </div>

          <div class="help-wrapper">
            <div class="help">
              <i class="ri-question-line"></i>
              <span>
                <p>Help</p>
                <i class="ri-arrow-drop-down-line"></i>
              </span>
            </div>
            <div class="help-container"></div>
          </div>

          <div class="cart">
            <i class="ri-shopping-cart-2-line"></i>
            <p>Cart</p>
          </div>
        </div>
      </div>
    </div>
    <!-- --------Hero section----------- -->
    <section class="hero-section">
      <div class="categories">
        <div class="categories-container">
          <div onclick="openSidebar()" class="cat-left">
            <span onclick="openSidebar()" id="mobile"></span>
            <i class="ri-equalizer-line"></i>
            <p>Category</p>
          </div>
          <ul class="cat-center" id="catCenter">
            <button onclick="closeSidebar()" id="close">
              <i class="ri-close-large-line"></i>
            </button>

            <li class="cat-item">
              <i class="ri-t-shirt-2-line"></i>
              <p>Outfits</p>
            </li>
            <li class="cat-item">
              <i class="ri-smartphone-line"></i>
              <p>Smartphones</p>
            </li>
            <li class="cat-item">
              <i class="ri-bowl-line"></i>
              <p>Groceries</p>
            </li>
            <li class="cat-item">
              <i class="ri-macbook-line"></i>
              <p>Laptops</p>
            </li>
            <li class="cat-item">
              <i class="ri-time-line"></i>
              <p>Watches</p>
            </li>
            <li class="cat-item">
              <i class="ri-yuque-line"></i>
              <p>Footwear</p>
            </li>
            <li class="cat-item">
              <i class="ri-glasses-line"></i>
              <p>Glases</p>
            </li>
          </ul>
          <div class="cat-right">
            <p>Walet Bal</p>
            <span>KES 0.00</span>
          </div>
        </div>
      </div>
    </section>
    <div class="top-selers-section">
      <div class="top-sellers">
        <div class="top-sellers-left">
          <span class="head"> <h3>Top Sales</h3></span>
          <ul class="top-items">
            <li>
              <i class="ri-megaphone-line"></i>
              <span>Promos</span>
            </li>

            <li>
              <i class="ri-cake-3-line"></i>
              <span>Snacks</span>
            </li>

            <li>
              <i class="ri-ink-bottle-line"></i>
              <span>Fats & Oils</span>
            </li>

            <li>
              <i class="ri-bowl-line"></i>
              <span>Vegetables</span>
            </li>

            <li>
              <i class="ri-restaurant-2-line"></i>
              <span>Food Additives</span>
            </li>

            <li>
              <i class="ri-goblet-2-line"></i>
              <span>Beverage</span>
            </li>

            <li>
              <i class="ri-hand-sanitizer-line"></i>
              <span>Cleaning</span>
            </li>

            <li>
              <i class="ri-book-2-line"></i>
              <span>Stationery</span>
            </li>

            <li>
              <i class="ri-brush-ai-line"></i>
              <span>Cosmetics</span>
            </li>
          </ul>
        </div>

        <div class="top-sellers-right">
          <div id="sliderContainer">
            <div class="slide-icons">
              <i
                onclick="slideImagesLeft()"
                class="ri-arrow-left-s-line left"
              ></i>
              <div class="slide-image" id="slider">
                <img src="./banner1.png" alt="" />
                <img src="./banner2.png" alt="" />
                <img src="./banner3.png" alt="" />
                <img src="./banner4.png" alt="" />
                <img src="./banner5.png" alt="" />
                <img src="./banner6.png" alt="" />
                <img src="./banner7.png" alt="" />
              </div>
              <i
                onclick="slideImagesRight()"
                class="ri-arrow-right-s-line right"
              ></i>
            </div>
          </div>
        </div>
      </div>
    </div>
    <section class="products-section">
      <div class="products-container" id="productContainer"></div>
    </section>
  </body>
  <script src="/javascript/home.js" ></script>
</html>
